name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test And Build
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test -q

      - name: Build app bundle
        run: ./scripts/build-macos-app.sh
